<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Archive Beta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f7;
}

header {
  padding: 15px 20px;
  font-size: 20px;
  font-weight: 600;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #ddd;
}

.container { display: flex; height: calc(100vh - 60px); }

.sidebar {
  width: 260px;
  background: white;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.folder {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.folder:hover { background: #eee; }

.main { flex: 1; padding: 20px; }

.card {
  background: white;
  padding: 12px;
  border-radius: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.thumb {
  width: 60px;
  height: 40px;
  border-radius: 6px;
  margin-right: 10px;
  object-fit: cover;
}

.row { display: flex; align-items: center; }

button {
  border: none;
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* Default button styles */
.primary { 
  background: black; 
  color: white; 
}

.secondary { 
  background: #e5e5ea; 
}

/* Hover effect for all buttons */
button:hover {
  transform: scale(1.08);
  background: #34c759; /* Apple-style green */
  color: white;
}

button:active {
  transform: scale(0.98);
}

/* Floating + button */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: black;
  color: white;
  font-size: 24px;
  transition: all 0.2s ease;
}

.fab:hover {
  transform: scale(1.12);
  background: #34c759;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 320px;
}
</style>
</head>

<body>

<header>📁 Media Archive Beta</header>

<div class="container">
  <div class="sidebar">
    <button class="primary" onclick="createFolder()">+ Folder</button>
    <button onclick="shareFolder()">🔗 Share Folder</button>
    <button onclick="shareAll()">🌐 Share Archive</button>
    <div id="folders"></div>
  </div>

  <div class="main">
    <input placeholder="Search..." oninput="search(this.value)">
    <select onchange="sortItems(this.value)">
      <option value="new">Newest</option>
      <option value="az">A-Z</option>
    </select>
    <div id="items"></div>
  </div>
</div>

<button class="fab" onclick="openAdd()">+</button>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("archive")) || {
  name: "root",
  folders: [],
  items: []
};

let path = [data];
let filtered = null;

function save() {
  localStorage.setItem("archive", JSON.stringify(data));
}

function current() {
  return path[path.length - 1];
}

function renderFolders() {
  let el = document.getElementById("folders");
  el.innerHTML = "";

  if (path.length > 1) {
    let back = document.createElement("div");
    back.innerHTML = "⬅ Back";
    back.style.cursor = "pointer";
    back.style.marginBottom = "10px";
    back.onclick = () => { path.pop(); render(); };
    el.appendChild(back);
  }

  current().folders.forEach((f, i) => {
    let div = document.createElement("div");
    div.className = "folder";

    div.innerHTML = `
      <span onclick="openFolder(${i})">${f.name}</span>
      <button onclick="deleteFolder(${i})">⋮</button>
    `;
    el.appendChild(div);
  });
}

function renderItems() {
  let el = document.getElementById("items");
  el.innerHTML = "";

  let items = filtered || current().items;

  items.forEach((item, i) => {
    let thumb = getThumbnail(item.content);

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="row" onclick="openLink(${i})">
        <img class="thumb" src="${thumb}">
        ${item.title}
      </div>
      <div>
        <button onclick="editItem(${i})">Edit</button>
        <button onclick="deleteItem(${i})">Delete</button>
      </div>
    `;

    el.appendChild(div);
  });
}

function getThumbnail(url) {
  if (url.includes("youtube")) {
    let id = url.split("v=")[1]?.split("&")[0];
    return "https://img.youtube.com/vi/" + id + "/0.jpg";
  }
  return "https://via.placeholder.com/60x40";
}

function openFolder(i) {
  path.push(current().folders[i]);
  render();
}

function createFolder() {
  let name = prompt("Folder name:");
  if (!name) return;

  current().folders.push({ name, folders: [], items: [] });
  save(); render();
}

function deleteFolder(i) {
  if (!confirm("Delete folder?")) return;
  current().folders.splice(i, 1);
  save(); render();
}

function openAdd() {
  showModal(`
    <h3>Add Link</h3>
    <input id="title" placeholder="Title">
    <input id="link" placeholder="URL">
    <button onclick="saveLink()">Save</button>
  `);
}

function saveLink() {
  let t = title.value;
  let l = link.value;

  if (!t || !l) return alert("Fill all fields");

  current().items.push({
    title: t,
    content: l,
    time: Date.now()
  });

  save(); closeModal(); render();
}

function openLink(i) {
  window.open(current().items[i].content, "_blank");
}

function editItem(i) {
  let item = current().items[i];

  showModal(`
    <input id="title" value="${item.title}">
    <input id="link" value="${item.content}">
    <button onclick="saveEdit(${i})">Save</button>
  `);
}

function saveEdit(i) {
  let item = current().items[i];
  item.title = title.value;
  item.content = link.value;
  save(); closeModal(); render();
}

function deleteItem(i) {
  if (!confirm("Delete item?")) return;
  current().items.splice(i, 1);
  save(); render();
}

function search(q) {
  if (!q) return filtered=null, renderItems();
  filtered = current().items.filter(i =>
    i.title.toLowerCase().includes(q.toLowerCase())
  );
  renderItems();
}

function sortItems(type) {
  if (type === "az") {
    current().items.sort((a,b)=>a.title.localeCompare(b.title));
  } else {
    current().items.sort((a,b)=>b.time-a.time);
  }
  renderItems();
}

function shareFolder() {
  let encoded = encodeURIComponent(JSON.stringify(current()));
  prompt("Copy this link:", location.href.split("?")[0] + "?data=" + encoded);
}

function shareAll() {
  let encoded = encodeURIComponent(JSON.stringify(data));
  prompt("Copy this link:", location.href.split("?")[0] + "?data=" + encoded);
}

function loadShared() {
  let params = new URLSearchParams(location.search);
  if (params.get("data")) {
    data = JSON.parse(decodeURIComponent(params.get("data")));
    path = [data];
  }
}

function showModal(html) {
  modalContent.innerHTML = html;
  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

modal.onclick = e => {
  if (e.target.id === "modal") closeModal();
};

function render() {
  renderFolders();
  renderItems();
}

loadShared();
render();
</script>

</body>
</html>
