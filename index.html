<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Archive Beta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f5f5f7; }

header {
  padding:15px 20px;
  font-size:20px;
  font-weight:600;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
}

.container { display:flex; height:calc(100vh - 60px); }

.sidebar {
  width:260px;
  background:white;
  border-right:1px solid #ddd;
  padding:10px;
}

.folder {
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  position:relative;
}

.folder:hover { background:#eee; }

.menu {
  position:absolute;
  right:10px;
  top:35px;
  background:white;
  border:1px solid #ddd;
  border-radius:10px;
  display:none;
  flex-direction:column;
  z-index:10;
}

.menu button {
  background:none;
  border:none;
  padding:8px;
  text-align:left;
  width:100%;
}

.menu button:hover {
  background:#34c759;
  color:white;
}

button {
  border:none;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
  transition:all 0.2s ease;
}

.primary { background:black; color:white; }

button:hover {
  transform:scale(1.08);
  background:#34c759;
  color:white;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:16px;
  width:320px;
}
</style>
</head>

<body>

<header>📁 Media Archive Beta</header>

<div class="container">
  <div class="sidebar">
    <button class="primary" id="createBtn">+ Folder</button>
    <div id="folders"></div>
  </div>

  <div class="main">
    <h3 id="pathDisplay">Root</h3>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="folderModal">
  <div class="modal-content">
    <h3>Create Folder</h3>
    <input id="newFolderName" placeholder="Folder Name">
    <button id="saveFolderBtn">Save</button>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("archive")) || {
  name:"root",
  folders:[],
  items:[]
};

let path=[data];

function save(){ localStorage.setItem("archive",JSON.stringify(data)); }
function current(){ return path[path.length-1]; }

/* RENDER */
function render(){
  renderFolders();
  renderPath();
}

function renderPath(){
  document.getElementById("pathDisplay").innerText =
    path.map(p=>p.name).join(" / ");
}

/* FOLDERS */
function renderFolders(){
  const el=document.getElementById("folders");
  el.innerHTML="";

  if(path.length>1){
    let back=document.createElement("div");
    back.textContent="⬅ Back";
    back.style.cursor="pointer";
    back.onclick=()=>{ path.pop(); render(); };
    el.appendChild(back);
  }

  current().folders.forEach((f,i)=>{
    const div=document.createElement("div");
    div.className="folder";

    const nameSpan=document.createElement("span");
    nameSpan.textContent=f.name;
    nameSpan.onclick=()=>openFolder(i);

    const menuBtn=document.createElement("button");
    menuBtn.textContent="⋮";

    const menu=document.createElement("div");
    menu.className="menu";

    const renameBtn=document.createElement("button");
    renameBtn.textContent="Rename";
    renameBtn.onclick=(e)=>{
      e.stopPropagation();
      renameFolder(i);
    };

    const deleteBtn=document.createElement("button");
    deleteBtn.textContent="Delete";
    deleteBtn.onclick=(e)=>{
      e.stopPropagation();
      deleteFolder(i);
    };

    menu.appendChild(renameBtn);
    menu.appendChild(deleteBtn);

    menuBtn.onclick=(e)=>{
      e.stopPropagation();
      closeAllMenus();
      menu.style.display="flex";
    };

    div.appendChild(nameSpan);
    div.appendChild(menuBtn);
    div.appendChild(menu);

    el.appendChild(div);
  });
}

/* MENU CLOSE */
function closeAllMenus(){
  document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
}

document.addEventListener("click", closeAllMenus);

/* ACTIONS */
function openFolder(i){
  path.push(current().folders[i]);
  render();
}

function deleteFolder(i){
  if(!confirm("Delete folder?")) return;
  current().folders.splice(i,1);
  save(); render();
}

function renameFolder(i){
  let name=prompt("New name:");
  if(!name) return;
  current().folders[i].name=name;
  save(); render();
}

/* CREATE FOLDER */
document.getElementById("createBtn").onclick=()=>{
  folderModal.style.display="flex";
  setTimeout(()=>newFolderName.focus(),50);
};

document.getElementById("saveFolderBtn").onclick=saveNewFolder;

function saveNewFolder(){
  let name=newFolderName.value.trim();
  if(!name){ alert("Enter name"); return; }

  current().folders.push({name,folders:[],items:[]});

  save();
  newFolderName.value="";
  folderModal.style.display="none";
  render();
}

/* ENTER KEY */
newFolderName.addEventListener("keydown",e=>{
  if(e.key==="Enter") saveNewFolder();
});

render();
</script>

</body>
</html>
