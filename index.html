<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Archive Beta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f5f5f7; }

header {
  padding:15px 20px;
  font-size:20px;
  font-weight:600;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #ddd;
}

.container { display:flex; height:calc(100vh - 60px); }

.sidebar {
  width:260px;
  background:white;
  border-right:1px solid #ddd;
  padding:10px;
}

.folder {
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.folder:hover { background:#eee; }

.main { flex:1; padding:20px; }

.card {
  background:white;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.thumb {
  width:60px;
  height:40px;
  border-radius:6px;
  margin-right:10px;
}

.row { display:flex; align-items:center; }

button {
  border:none;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
  transition:all 0.2s ease;
}

.primary { background:black; color:white; }
.secondary { background:#e5e5ea; }

button:hover {
  transform:scale(1.08);
  background:#34c759;
  color:white;
}

button:active { transform:scale(0.98); }

.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:black;
  color:white;
  font-size:24px;
  transition:all 0.2s ease;
}

.fab:hover { transform:scale(1.12); background:#34c759; }

input, select {
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:16px;
  width:320px;
}
</style>
</head>

<body>

<header>📁 Media Archive Beta</header>

<div class="container">
  <div class="sidebar">
    <button class="primary" onclick="openCreateFolderPanel()">+ Folder</button>
    <div id="folders"></div>
  </div>

  <div class="main">
    <div id="items"></div>
  </div>
</div>

<button class="fab" onclick="openAdd()">+</button>

<!-- Folder Modal -->
<div class="modal" id="folderModal">
  <div class="modal-content">
    <h3>Create New Folder</h3>
    <input id="newFolderName" placeholder="Folder Name">
    <button onclick="saveNewFolder()">Save</button>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("archive")) || {
  name: "root",
  folders: [],
  items: []
};

let path = [data];

function save() {
  localStorage.setItem("archive", JSON.stringify(data));
}

function current() {
  return path[path.length - 1];
}

/* 🔥 HARD RESET RENDER */
function render() {
  renderFolders();
  renderItems();
}

/* 🔥 FIXED FOLDER RENDER */
function renderFolders() {
  const el = document.getElementById("folders");
  el.innerHTML = "";

  const folders = current().folders;

  if (!folders || folders.length === 0) {
    el.innerHTML = "<p style='opacity:0.5'>No folders yet</p>";
    return;
  }

  folders.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "folder";

    div.innerHTML = `
      <span onclick="openFolder(${i})">${f.name}</span>
      <button onclick="deleteFolder(${i})">⋮</button>
    `;

    el.appendChild(div);
  });
}

/* ITEMS (kept simple for stability) */
function renderItems() {
  document.getElementById("items").innerHTML = "";
}

/* CREATE FOLDER PANEL */
function openCreateFolderPanel() {
  document.getElementById("folderModal").style.display = "flex";
}

/* 🔥 ACTUAL FIX HERE */
function saveNewFolder() {
  const input = document.getElementById("newFolderName");
  const name = input.value.trim();

  if (!name) {
    alert("Enter folder name");
    return;
  }

  console.log("Creating folder:", name);

  current().folders.push({
    name: name,
    folders: [],
    items: []
  });

  save();

  input.value = "";
  document.getElementById("folderModal").style.display = "none";

  // 🔥 FORCE FULL UI REFRESH
  setTimeout(() => {
    render();
  }, 0);
}

function openFolder(i) {
  path.push(current().folders[i]);
  render();
}

function deleteFolder(i) {
  current().folders.splice(i, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
